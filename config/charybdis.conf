# ====================================================================
# CONFIGURACIÓN DEL SENSOR TRACKBALL (PMW3610) Y RATÓN
# ====================================================================
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_EXT_POWER=y

CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=1200
CONFIG_PMW3610_CPI_DIVIDOR=2
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_SNIPE_CPI=200
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=1
CONFIG_PMW3610_SCROLL_TICK=70
CONFIG_PMW3610_INVERT_X=y

CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=400

# ====================================================================
# ZMK STUDIO
# ====================================================================
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# ====================================================================
# ILUMINACIÓN RGB
# ====================================================================
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=280
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50

# ====================================================================
# OPTIMIZACIONES PARA MACOS Y BLUETOOTH
# ====================================================================
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32

# Estabilidad con chips de Apple
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# ====================================================================
# GESTIÓN DE ENERGÍA (Optimizada para cuidar la batería)
# ====================================================================
# Apaga luces tras 30 segundos de inactividad
CONFIG_ZMK_IDLE_TIMEOUT=30000
# Activa el modo de bajo consumo profundo
CONFIG_ZMK_SLEEP=y
# Entra en sueño profundo tras 15 minutos de inactividad (900000 ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
