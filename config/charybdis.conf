# CONFIG_BT_LL_SW_LLCP_LEGACY=y

# CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
# CONFIG_BT_BUF_ACL_TX_COUNT=32
# CONFIG_BT_L2CAP_TX_BUF_COUNT=32

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# Tiempo en ms antes de entrar en idle (30 segundos)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Habilitar deep sleep
CONFIG_ZMK_SLEEP=y

# Tiempo en ms antes de deep sleep (30 minutos = 1800000)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Apagar RGB en idle para ahorrar batería
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Habilitar soporte de mouse/trackball
CONFIG_ZMK_MOUSE=y

# 启用键盘RGB功能。
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=280
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50

#旋钮配置
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_KEYBOARD_NAME="V&Z-Nano35"

